<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --ink: #16130E;
    --slate: #211C15;
    --ash: #2E2820;
    --ash-soft: #3a3226;
    --parchment: #EDE6D6;
    --muted: #A79C86;
    --ember: #E8622A;
    --gold: #F2B03D;
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
    --ui: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background:
      radial-gradient(920px 520px at 84% -12%, rgba(232, 98, 42, 0.28), transparent 62%),
      radial-gradient(760px 460px at 4% 108%, rgba(242, 176, 61, 0.14), transparent 58%),
      var(--ink);
    color: var(--parchment);
    font-family: var(--ui);
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* faint mono grid texture, like cast rows */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(46,40,32,0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(46,40,32,0.5) 1px, transparent 1px);
    background-size: 60px 60px;
    -webkit-mask-image: radial-gradient(1000px 700px at 100% 0%, rgba(0,0,0,0.5), transparent 70%);
            mask-image: radial-gradient(1000px 700px at 100% 0%, rgba(0,0,0,0.5), transparent 70%);
    opacity: 0.6;
  }

  .frame {
    position: absolute; inset: 44px;
    border: 1px solid var(--ash);
    border-radius: 20px;
    background: rgba(33, 28, 21, 0.28);
  }

  .content {
    position: absolute;
    inset: 44px;
    padding: 70px 78px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .top { display: flex; align-items: center; gap: 22px; }
  .mark {
    display: grid; place-items: center;
    width: 92px; height: 92px;
    border-radius: 20px;
    background: var(--slate);
    border: 1px solid var(--ash-soft);
    box-shadow: inset 0 0 40px rgba(232, 98, 42, 0.22);
    flex: none;
  }
  .mark svg { width: 58px; height: 58px; display: block; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 22px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .center { }
  .wordmark {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 152px;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--parchment);
  }
  .tagline {
    margin-top: 30px;
    font-family: var(--ui);
    font-size: 40px;
    line-height: 1.28;
    font-weight: 400;
    color: var(--parchment);
    max-width: 900px;
  }
  .tagline .glow {
    color: transparent;
    background: linear-gradient(120deg, #F2B03D, #E8622A);
    -webkit-background-clip: text;
            background-clip: text;
    font-weight: 600;
  }

  .chips { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .chip {
    font-family: var(--mono);
    font-size: 24px;
    letter-spacing: 0.02em;
    color: var(--gold);
    border: 1px solid var(--ash-soft);
    background: rgba(22, 19, 14, 0.6);
    border-radius: 999px;
    padding: 10px 22px;
  }
  .chip.dim { color: var(--muted); }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="frame"></div>
  <div class="content">
    <div class="top">
      <span class="mark">
        <svg viewBox="0 0 32 32" focusable="false" aria-hidden="true">
          <path d="M6 22 L16 7 L26 22 Z" fill="none" stroke="#E8622A" stroke-width="2.2" stroke-linejoin="round"/>
          <circle cx="16" cy="22" r="3.4" fill="#F2B03D"/>
        </svg>
      </span>
      <span class="eyebrow">private test-data generator</span>
    </div>

    <div class="center">
      <div class="wordmark">seedforge</div>
      <div class="tagline">Forge realistic data. <span class="glow">Nothing leaves your machine.</span></div>
    </div>

    <div class="chips">
      <span class="chip">CSV</span>
      <span class="chip">JSON</span>
      <span class="chip">SQL</span>
      <span class="chip dim">reproducible</span>
      <span class="chip dim">offline</span>
    </div>
  </div>
</body>
</html>
