<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #16130E;
    display: grid;
    place-items: center;
  }
  /* ~12% safe padding for maskable icons: mark sits within the inner ~76% */
  .mark {
    width: 76vmin;
    height: 76vmin;
    display: grid;
    place-items: center;
    border-radius: 20vmin;
    background:
      radial-gradient(60% 60% at 50% 38%, rgba(232, 98, 42, 0.28), transparent 70%),
      #211C15;
    border: 0.6vmin solid #3a3226;
    box-shadow: inset 0 0 12vmin rgba(232, 98, 42, 0.2);
  }
  svg { width: 52vmin; height: 52vmin; display: block; }
</style>
</head>
<body>
  <span class="mark">
    <svg viewBox="0 0 32 32" focusable="false" aria-hidden="true">
      <path d="M6 22 L16 7 L26 22 Z" fill="none" stroke="#E8622A" stroke-width="2.4" stroke-linejoin="round"/>
      <circle cx="16" cy="22" r="3.4" fill="#F2B03D"/>
    </svg>
  </span>
</body>
</html>
